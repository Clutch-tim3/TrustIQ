version: '3.9'

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV:    development
      PORT:        "${PORT:-3000}"
      DATABASE_URL: postgresql://trustiq:password@db:5432/trustiq
      REDIS_URL:   redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/v1/health"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 30s

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     trustiq
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       trustiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustiq"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: always

volumes:
  postgres_data:
  redis_data:
